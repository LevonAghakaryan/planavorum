<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Հարսանեկան Սրահ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; }
        .font-cormorant { font-family: 'Cormorant Garamond', serif; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4b896; border-radius: 10px; }
        button:focus, input:focus, select:focus { outline: none !important; box-shadow: none !important; }
        button:focus-visible, input:focus-visible, select:focus-visible { outline: none !important; }
        .hall-grid {
            background-image: linear-gradient(to right, #e8ddd0 1px, transparent 1px),
                              linear-gradient(to bottom, #e8ddd0 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .zoom-wrapper { position: absolute; top: 0; left: 0; width: 4000px; height: 4000px; transform-origin: top left; }
        .movable-table { position: absolute; cursor: move; user-select: none; }
        .movable-table.dragging { z-index: 100; }
        .chair {
            position: absolute;
            width: 26px; height: 26px;
            border-radius: 50%;
            background: white;
            border: 1.5px dashed #c8bfb2;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; color: #8c7b66;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.15s;
            z-index: 15;
            font-weight: 500;
        }
        .chair:hover { border-color: #c9a96e; background: rgba(201,169,110,0.12); }
        .chair.occupied { background: #1a1612; border: 1.5px solid #1a1612; color: #e8d5b0; font-size: 8px; font-weight: 700; }
        .chair.occupied:hover { background: #3d3228; }
        .table-actions { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; white-space: nowrap; z-index: 20; }
        .movable-table:hover .table-actions { opacity: 1; }
        .movable-table.drag-over .table-inner { border-color: #c9a96e !important; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(26,22,18,0.55); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 200; }
        .modal-overlay.open { display: flex; }
        input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    </style>
</head>
<body class="bg-[#f7f3ee] text-[#1a1612] h-screen flex flex-col overflow-hidden">

<!-- HEADER -->
<header class="bg-[#1a1612] h-14 flex items-center justify-between px-6 flex-shrink-0 z-50">
    <div class="flex items-center gap-4">
        <a href="/" class="text-[#e8d5b0] opacity-60 hover:opacity-100 transition-opacity text-lg no-underline">←</a>
        <h1 id="weddingHeaderTitle" class="font-cormorant text-[#e8d5b0] text-xl font-semibold tracking-wide">Բեռնվում է...</h1>
    </div>
    <div class="flex gap-2">
        <button onclick="startAddTable('round')"    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-[#c9a96e]/40 text-[#e8d5b0] text-xs font-medium hover:bg-[#c9a96e]/15 hover:border-[#c9a96e] transition-all">
            <span class="w-3 h-3 rounded-full border border-[#e8d5b0]/60 inline-block"></span> Կլոր
        </button>
        <button onclick="startAddTable('rectangle')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-[#c9a96e]/40 text-[#e8d5b0] text-xs font-medium hover:bg-[#c9a96e]/15 hover:border-[#c9a96e] transition-all">
            <span class="w-4 h-2 rounded-sm border border-[#e8d5b0]/60 inline-block"></span> Ուղղ.
        </button>
        <button onclick="startAddTable('double_rectangle')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-[#c9a96e]/40 text-[#e8d5b0] text-xs font-medium hover:bg-[#c9a96e]/15 hover:border-[#c9a96e] transition-all">
            <span class="w-5 h-2 rounded-sm border border-[#e8d5b0]/60 inline-block"></span> Կրկ.
        </button>
        <button onclick="startAddTable('presidium')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-[#c9a96e]/40 text-[#e8d5b0] text-xs font-medium hover:bg-[#c9a96e]/15 hover:border-[#c9a96e] transition-all">
            <span class="text-[#c9a96e]">★</span> Պրեզ.
        </button>
    </div>
</header>

<main class="flex-1 grid overflow-hidden" style="grid-template-columns: 280px 1fr 260px;">

    <!-- LEFT: Guests -->
    <div class="bg-[#fefcf9] border-r border-[#e8ddd0] flex flex-col overflow-hidden">
        <div class="px-4 pt-4 pb-3 border-b border-[#e8ddd0]">
            <div class="font-cormorant text-base font-semibold text-[#1a1612]">Հյուրերի ցուցակ</div>
        </div>

        <!-- Add guest form -->
        <div class="p-3 border-b border-[#e8ddd0] bg-[#c9a96e]/[0.04] flex-shrink-0">
            <input type="text" id="guestName" placeholder="Անուն / Ազգ."
                class="w-full px-3 py-1.5 mb-1.5 rounded-lg border border-[#e8ddd0] bg-white text-xs text-[#1a1612] placeholder-[#8c7b66] transition-colors hover:border-[#c9a96e] focus:border-[#c9a96e]">
            <div class="flex gap-1.5 mb-1.5">
                <input type="number" id="guestCount" value="1" min="1"
                    class="w-16 px-2 py-1.5 rounded-lg border border-[#e8ddd0] bg-white text-xs text-[#1a1612] flex-shrink-0 focus:border-[#c9a96e]">
                <select id="guestSide" class="flex-1 px-2 py-1.5 rounded-lg border border-[#e8ddd0] bg-white text-xs text-[#1a1612] cursor-pointer focus:border-[#c9a96e]">
                    <option value="bride">👰 Հարսի</option>
                    <option value="groom">🤵 Փեսայի</option>
                    <option value="mutual">🤝 Ընդհ.</option>
                </select>
            </div>
            <button onclick="addGuest()" class="w-full py-2 bg-[#1a1612] text-[#e8d5b0] rounded-lg text-xs font-semibold hover:bg-[#3d3228] transition-colors">
                ＋ Ավելացնել հյուր
            </button>
        </div>

        <!-- Merge bar -->
        <div id="mergeBar" class="hidden px-3 py-2 bg-[#c4736a]/10 border-b border-[#c4736a]/20 flex-shrink-0">
            <button onclick="mergeSelectedGuests()" class="w-full py-1.5 bg-[#c4736a] text-white rounded-lg text-xs font-semibold hover:bg-[#b06059] transition-colors">
                🧩 Միավորել ընտրվածները
            </button>
        </div>

        <div id="guestsContainer" class="flex-1 overflow-y-auto p-2.5">
            <p class="text-center text-[#8c7b66] text-xs italic py-6">Բեռնվում է...</p>
        </div>
    </div>

    <!-- CENTER: Hall -->
    <div class="relative overflow-hidden bg-[#fdfaf6]">
        <div class="zoom-controls absolute right-3 top-3 z-30 flex flex-col gap-1">
            <button onclick="zoomHall(1.15)" class="w-8 h-8 bg-white border border-[#e8ddd0] rounded-lg text-base font-semibold text-[#5c4f3d] shadow-sm hover:bg-[#f7f3ee] transition-all flex items-center justify-center">+</button>
            <button onclick="zoomHall(0.87)" class="w-8 h-8 bg-white border border-[#e8ddd0] rounded-lg text-base font-semibold text-[#5c4f3d] shadow-sm hover:bg-[#f7f3ee] transition-all flex items-center justify-center">−</button>
            <button onclick="resetZoom()" class="w-8 h-8 bg-white border border-[#e8ddd0] rounded-lg text-sm text-[#5c4f3d] shadow-sm hover:bg-[#f7f3ee] transition-all flex items-center justify-center">⊙</button>
        </div>
        <div class="hall-grid w-full h-full relative" id="hallContainer" ondragover="event.preventDefault()">
            <div id="zoomWrapper" class="zoom-wrapper"></div>
        </div>
    </div>

    <!-- RIGHT: Unseated groups -->
    <div class="bg-[#fefcf9] border-l border-[#e8ddd0] flex flex-col overflow-hidden">
        <div class="px-4 pt-4 pb-3 border-b border-[#e8ddd0]">
            <div class="font-cormorant text-base font-semibold text-[#1a1612]">Չնստեցվածներ</div>
            <div id="unseatedSummary" class="text-[10px] text-[#8c7b66] mt-0.5">Բեռնվում է...</div>
        </div>
        <!-- Shape mini-legend -->
        <div class="flex gap-3 px-3 py-2 border-b border-[#e8ddd0] bg-[#c9a96e]/[0.03] flex-shrink-0">
            <div class="flex items-center gap-1 text-[10px] text-[#8c7b66]"><span class="w-3 h-3 rounded-full bg-[#e8e0d4] border border-[#cfc4b4] inline-block"></span>Կլոր</div>
            <div class="flex items-center gap-1 text-[10px] text-[#8c7b66]"><span class="w-4 h-2 rounded-sm bg-[#e8e0d4] border border-[#cfc4b4] inline-block"></span>Ուղղ.</div>
            <div class="flex items-center gap-1 text-[10px] text-[#8c7b66]"><span class="w-5 h-2 rounded-sm bg-[#e8e0d4] border border-[#cfc4b4] inline-block"></span>Կրկ.</div>
            <div class="flex items-center gap-1 text-[10px] text-[#8c7b66]"><span class="w-6 h-1.5 rounded-sm bg-[#ddd5c4] border border-[#c4b89e] inline-block"></span>Պրեզ.</div>
        </div>
        <div id="unseatedContainer" class="flex-1 overflow-y-auto p-2.5">
            <p class="text-center text-[#8c7b66] text-xs italic py-6">Բեռնվում է...</p>
        </div>
    </div>
</main>

<!-- MODAL: Add table — step 1: name, step 2: capacity -->
<div class="modal-overlay" id="addTableModal" onclick="closeModal('addTableModal')">
    <div class="bg-[#fdfaf6] rounded-2xl w-80 shadow-2xl border border-[#e8ddd0] overflow-hidden" onclick="event.stopPropagation()">
        <div class="px-5 py-4 border-b border-[#e8ddd0] flex justify-between items-center">
            <span id="addTableModalTitle" class="font-cormorant text-lg font-semibold text-[#1a1612]">Նոր սեղան</span>
            <button onclick="closeModal('addTableModal')" class="text-[#8c7b66] hover:text-[#1a1612] text-lg leading-none transition-colors">✕</button>
        </div>
        <div class="p-5 space-y-4">
            <!-- Table number -->
            <div>
                <label class="block text-[10px] font-semibold text-[#8c7b66] uppercase tracking-wider mb-1.5">Սեղանի համարը / անունը</label>
                <input id="newTableNumber" type="text" placeholder="Օր.՝ 1, A, VIP..."
                    class="w-full px-3 py-2 rounded-lg border border-[#e8ddd0] bg-white text-sm text-[#1a1612] placeholder-[#c8bfb2] focus:border-[#c9a96e] transition-colors">
            </div>
            <!-- Capacity -->
            <div>
                <label class="block text-[10px] font-semibold text-[#8c7b66] uppercase tracking-wider mb-1.5">Աթոռների քանակ</label>
                <div class="flex items-center gap-3 bg-[#c9a96e]/[0.06] rounded-xl border border-[#e8ddd0] px-4 py-3">
                    <button onclick="changeNewCapacity(-1)" class="w-8 h-8 rounded-full border border-[#e8ddd0] bg-white text-[#1a1612] text-base font-medium flex items-center justify-center hover:border-[#c9a96e] hover:bg-[#f7f3ee] transition-all flex-shrink-0">−</button>
                    <span id="newCapacityDisplay" class="font-cormorant text-3xl font-bold text-[#1a1612] flex-1 text-center">10</span>
                    <button onclick="changeNewCapacity(1)"  class="w-8 h-8 rounded-full border border-[#e8ddd0] bg-white text-[#1a1612] text-base font-medium flex items-center justify-center hover:border-[#c9a96e] hover:bg-[#f7f3ee] transition-all flex-shrink-0">+</button>
                </div>
                <p id="addTableCatNote" class="text-[10px] text-[#8c7b66] mt-1.5 text-center"></p>
            </div>
            <button onclick="confirmAddTable()" class="w-full py-2.5 bg-[#1a1612] text-[#e8d5b0] rounded-xl text-sm font-semibold hover:bg-[#3d3228] transition-colors">
                Ստեղծել սեղան ✓
            </button>
        </div>
    </div>
</div>

<!-- MODAL: Seat count picker -->
<div class="modal-overlay" id="seatCountModal" onclick="closeModal('seatCountModal')">
    <div class="bg-[#fdfaf6] rounded-2xl w-72 shadow-2xl border border-[#e8ddd0] overflow-hidden" onclick="event.stopPropagation()">
        <div class="px-5 py-4 border-b border-[#e8ddd0] flex justify-between items-center">
            <span id="seatCountTitle" class="font-cormorant text-lg font-semibold text-[#1a1612]"></span>
            <button onclick="closeModal('seatCountModal')" class="text-[#8c7b66] hover:text-[#1a1612] text-lg leading-none transition-colors">✕</button>
        </div>
        <div class="p-5">
            <p class="text-[11px] text-[#8c7b66] mb-4" id="seatCountHint"></p>
            <div class="flex items-center gap-3 bg-[#c9a96e]/[0.06] rounded-xl border border-[#e8ddd0] px-4 py-3 mb-4">
                <button onclick="changeSeatCount(-1)" class="w-8 h-8 rounded-full border border-[#e8ddd0] bg-white text-[#1a1612] text-base font-medium flex items-center justify-center hover:border-[#c9a96e] hover:bg-[#f7f3ee] transition-all flex-shrink-0">−</button>
                <span id="seatCountDisplay" class="font-cormorant text-3xl font-bold text-[#1a1612] flex-1 text-center">1</span>
                <button onclick="changeSeatCount(1)"  class="w-8 h-8 rounded-full border border-[#e8ddd0] bg-white text-[#1a1612] text-base font-medium flex items-center justify-center hover:border-[#c9a96e] hover:bg-[#f7f3ee] transition-all flex-shrink-0">+</button>
            </div>
            <p id="seatCountMax" class="text-[10px] text-[#8c7b66] text-center mb-4"></p>
            <button onclick="confirmSeatCount()" class="w-full py-2.5 bg-[#1a1612] text-[#e8d5b0] rounded-xl text-sm font-semibold hover:bg-[#3d3228] transition-colors">
                Ընտրել սեղան ➔
            </button>
        </div>
    </div>
</div>

<!-- MODAL: Table picker -->
<div class="modal-overlay" id="tablePickerModal" onclick="closeModal('tablePickerModal')">
    <div class="bg-[#fdfaf6] rounded-2xl w-80 max-h-[480px] flex flex-col shadow-2xl border border-[#e8ddd0] overflow-hidden" onclick="event.stopPropagation()">
        <div class="px-5 py-4 border-b border-[#e8ddd0] flex justify-between items-center flex-shrink-0">
            <span id="tablePickerTitle" class="font-cormorant text-lg font-semibold text-[#1a1612]">Ընտրել սեղան</span>
            <button onclick="closeModal('tablePickerModal')" class="text-[#8c7b66] hover:text-[#1a1612] text-lg leading-none transition-colors">✕</button>
        </div>
        <div id="tablePickerList" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
    </div>
</div>

<!-- MODAL: Single guest picker (chair click) -->
<div class="modal-overlay" id="guestPickerModal" onclick="closeModal('guestPickerModal')">
    <div class="bg-[#fdfaf6] rounded-2xl w-80 max-h-[480px] flex flex-col shadow-2xl border border-[#e8ddd0] overflow-hidden" onclick="event.stopPropagation()">
        <div class="px-5 py-4 border-b border-[#e8ddd0] flex justify-between items-center flex-shrink-0">
            <span class="font-cormorant text-lg font-semibold text-[#1a1612]">Նստեցնել հյուր</span>
            <button onclick="closeModal('guestPickerModal')" class="text-[#8c7b66] hover:text-[#1a1612] text-lg leading-none transition-colors">✕</button>
        </div>
        <div id="guestPickerList" class="flex-1 overflow-y-auto p-3 space-y-1.5"></div>
    </div>
</div>

<!-- MODAL: Table sheet -->
<div class="modal-overlay" id="tableSheetModal" onclick="closeModal('tableSheetModal')">
    <div class="bg-[#fdfaf6] rounded-2xl w-96 max-h-[520px] flex flex-col shadow-2xl border border-[#e8ddd0] overflow-hidden" onclick="event.stopPropagation()">
        <div class="px-5 py-4 border-b border-[#e8ddd0] flex justify-between items-center flex-shrink-0">
            <span id="tableSheetTitle" class="font-cormorant text-lg font-semibold text-[#1a1612]">Սեղանի թերթիկ</span>
            <button onclick="closeModal('tableSheetModal')" class="text-[#8c7b66] hover:text-[#1a1612] text-lg leading-none transition-colors">✕</button>
        </div>
        <div id="tableSheetBody" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
    </div>
</div>

<script>
const weddingId = {{ wedding_id }};
let zoomScale = 1.0;
let activeMovingTable = null;
let dragOffset = { x: 0, y: 0 };
let globalUnseatedMembers = [];
let globalAllGuests = [];
let selectedGuestIds = [];
let pendingSeatGuest = null;
let pendingSeatCount = 1;
let pendingSeatTableId = null;
const tablePositions = {};

// Add table modal state
let pendingNewCategory = null;
let pendingNewCapacity = 10;
const defaultCapacity = { round: 12, rectangle: 8, double_rectangle: 16, presidium: 20 };
const catLabel = { round: 'Կլոր', rectangle: 'Ուղղ.', double_rectangle: 'Կրկ. Ուղղ.', presidium: 'Պրեզիդիում' };

document.addEventListener('DOMContentLoaded', () => {
    loadWeddingDetails();
    loadGuests();
    loadTables();
    loadUnseated();
});

// ── WEDDING ──
async function loadWeddingDetails() {
    const res = await fetch(`/api/v1/weddings/${weddingId}`);
    if (res.ok) {
        const d = await res.json();
        document.getElementById('weddingHeaderTitle').innerText = `${d.title} — Սրահ`;
        document.title = d.title;
    }
}

// ── ZOOM ──
function zoomHall(f) {
    zoomScale = Math.min(2.5, Math.max(0.3, zoomScale * f));
    document.getElementById('zoomWrapper').style.transform = `scale(${zoomScale})`;
}
function resetZoom() {
    zoomScale = 1.0;
    document.getElementById('zoomWrapper').style.transform = 'scale(1)';
}

// ── ADD TABLE FLOW: step 1 open modal ──
function startAddTable(category) {
    pendingNewCategory = category;
    pendingNewCapacity = defaultCapacity[category] || 10;
    document.getElementById('addTableModalTitle').innerText = `Նոր ${catLabel[category]} սեղան`;
    document.getElementById('newCapacityDisplay').innerText = pendingNewCapacity;
    document.getElementById('newTableNumber').value = '';
    document.getElementById('addTableCatNote').innerText =
        category === 'round' ? 'Կլոր սեղան — աթոռները շրջանով' :
        category === 'rectangle' ? 'Ուղղանկյուն — աթոռները երկու կողմից' :
        category === 'double_rectangle' ? 'Կրկնակի — երկու կողմից, ավելի երկար' :
        'Պրեզիդիում — լայն, հյուրերի ի պատիվ';
    openModal('addTableModal');
    setTimeout(() => document.getElementById('newTableNumber').focus(), 100);
}

function changeNewCapacity(delta) {
    pendingNewCapacity = Math.max(1, Math.min(60, pendingNewCapacity + delta));
    document.getElementById('newCapacityDisplay').innerText = pendingNewCapacity;
}

async function confirmAddTable() {
    const num = document.getElementById('newTableNumber').value.trim();
    if (!num) { document.getElementById('newTableNumber').focus(); return; }
    const res = await fetch('/api/v1/tables/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ wedding_id: weddingId, table_number: num, category: pendingNewCategory, capacity: pendingNewCapacity })
    });
    if (res.ok) { closeModal('addTableModal'); loadTables(); }
}

// ── TABLES RENDER ──
async function loadTables() {
    const res = await fetch(`/api/v1/tables/wedding/${weddingId}`);
    const wrapper = document.getElementById('zoomWrapper');
    wrapper.innerHTML = '';
    if (!res.ok) return;
    const tables = await res.json();

    const guestsRes = await fetch(`/api/v1/guests/wedding/${weddingId}`);
    let allMembers = [];
    if (guestsRes.ok) {
        const guests = await guestsRes.json();
        guests.forEach(g => g.members.forEach(m => allMembers.push(m)));
    }

    tables.forEach((table, index) => wrapper.appendChild(buildTableElement(table, allMembers, index)));
}

function getTableDimensions(category) {
    switch(category) {
        case 'round':            return { w: 150, h: 150, radius: 86 };
        case 'rectangle':        return { w: 220, h: 100 };
        case 'double_rectangle': return { w: 300, h: 110 };
        case 'presidium':        return { w: 400, h: 75 };
        default:                 return { w: 160, h: 160 };
    }
}

function buildTableElement(table, allMembers, index) {
    const dim = getTableDimensions(table.category);
    const isRound = table.category === 'round';

    const tDiv = document.createElement('div');
    tDiv.className = 'movable-table';
    tDiv.setAttribute('data-table-id', table.id);

    const savedPos = tablePositions[table.id];
    const x = savedPos ? savedPos.x : 60 + (index % 3) * 300;
    const y = savedPos ? savedPos.y : 80 + Math.floor(index / 3) * 230;
    tDiv.style.left = x + 'px';
    tDiv.style.top  = y + 'px';
    tDiv.style.width  = dim.w + 'px';
    tDiv.style.height = dim.h + 'px';

    // Inner table body
    const body = document.createElement('div');
    body.className = 'table-inner';
    const bodyStyle = [
        'position:relative', 'width:100%', 'height:100%',
        'background:#e8e0d4', 'border:2px solid #cfc4b4',
        'display:flex', 'align-items:center', 'justify-content:center', 'flex-direction:column',
        table.category === 'round' ? 'border-radius:50%' :
        table.category === 'presidium' ? 'border-radius:8px;background:#ddd5c4;border-color:#c4b89e' :
        'border-radius:10px'
    ].join(';');
    body.style.cssText = bodyStyle;

    body.innerHTML = `
        <div style="text-align:center;pointer-events:none;z-index:2;">
            <div style="font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:#1a1612;line-height:1.1;">Սեղ. ${table.table_number}</div>
            <div style="font-size:10px;color:#8c7b66;margin-top:2px;">${table.capacity} տեղ</div>
        </div>
    `;

    // Action buttons
    const actions = document.createElement('div');
    actions.className = 'table-actions';
    actions.innerHTML = `
        <button onclick="event.stopPropagation();openTableSheet(${table.id})" style="background:white;border:1px solid #e8ddd0;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;color:#5c4f3d;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s;" onmouseover="this.style.borderColor='#c9a96e'" onmouseout="this.style.borderColor='#e8ddd0'">📋 Թերթիկ</button>
        <button onclick="event.stopPropagation();editTableCapacity(${table.id},${table.capacity})" style="background:white;border:1px solid #e8ddd0;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;color:#5c4f3d;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s;" onmouseover="this.style.borderColor='#c9a96e'" onmouseout="this.style.borderColor='#e8ddd0'">✏️ Աթոռ</button>
        <button onclick="event.stopPropagation();deleteTable(${table.id})" style="background:white;border:1px solid #e8ddd0;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;color:#5c4f3d;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s;" onmouseover="this.style.color='#c4736a';this.style.borderColor='#c4736a'" onmouseout="this.style.color='#5c4f3d';this.style.borderColor='#e8ddd0'">🗑️</button>
    `;

    tDiv.appendChild(body);
    tDiv.appendChild(actions);

    // Chairs
    const seatedHere = allMembers.filter(m => m.table_id === table.id);
    for (let i = 0; i < table.capacity; i++) {
        const chair = document.createElement('div');
        chair.className = 'chair';
        const member = seatedHere[i] || null;
        if (member) {
            chair.classList.add('occupied');
            chair.innerText = member.first_name ? member.first_name.substring(0, 3) : '👤';
            chair.title = member.first_name || 'Անանուն';
            chair.onclick = (e) => { e.stopPropagation(); manageSeatedMember(member); };
        } else {
            chair.innerText = i + 1;
            chair.title = 'Ազատ — սեղմեք';
            chair.onclick = (e) => { e.stopPropagation(); openGuestPicker(table.id); };
        }
        const pos = getChairPosition(table.category, i, table.capacity, dim);
        chair.style.left = pos.x + 'px';
        chair.style.top  = pos.y + 'px';
        body.appendChild(chair);
    }

    body.addEventListener('click', (e) => { if (!e.target.classList.contains('chair')) openTableSheet(table.id); });

    // Drag to move
    tDiv.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'BUTTON' || e.target.classList.contains('chair')) return;
        e.preventDefault();
        activeMovingTable = tDiv;
        tDiv.classList.add('dragging');
        const rect = tDiv.getBoundingClientRect();
        dragOffset.x = (e.clientX - rect.left) / zoomScale;
        dragOffset.y = (e.clientY - rect.top)  / zoomScale;
    });

    // Drop guest on table
    tDiv.addEventListener('dragover', (e) => { e.preventDefault(); tDiv.classList.add('drag-over'); });
    tDiv.addEventListener('dragleave', () => tDiv.classList.remove('drag-over'));
    tDiv.addEventListener('drop', async (e) => {
        e.preventDefault();
        tDiv.classList.remove('drag-over');
        const memberId = e.dataTransfer.getData('text/plain');
        if (memberId) await seatMemberOnTable(parseInt(memberId), table.id);
    });

    return tDiv;
}

function getChairPosition(category, i, total, dim) {
    const w = dim.w, h = dim.h;
    if (category === 'round') {
        const angle = (i * 2 * Math.PI) / total - Math.PI / 2;
        return { x: w/2 + (dim.radius) * Math.cos(angle), y: h/2 + (dim.radius) * Math.sin(angle) };
    }
    const half = Math.ceil(total / 2);
    const spacing = w / (half + 1);
    if (i < half) return { x: spacing * (i + 1), y: -16 };
    return { x: spacing * (i - half + 1), y: h + 16 };
}

document.addEventListener('mousemove', (e) => {
    if (!activeMovingTable) return;
    const hall = document.getElementById('hallContainer').getBoundingClientRect();
    let x = (e.clientX - hall.left) / zoomScale - dragOffset.x;
    let y = (e.clientY - hall.top)  / zoomScale - dragOffset.y;
    x = Math.max(0, x); y = Math.max(0, y);
    activeMovingTable.style.left = x + 'px';
    activeMovingTable.style.top  = y + 'px';
    tablePositions[activeMovingTable.getAttribute('data-table-id')] = { x, y };
});
document.addEventListener('mouseup', () => {
    if (activeMovingTable) { activeMovingTable.classList.remove('dragging'); activeMovingTable = null; }
});

// ── TABLE SHEET ──
async function openTableSheet(tableId) {
    const [gR, tR] = await Promise.all([
        fetch(`/api/v1/guests/wedding/${weddingId}`),
        fetch(`/api/v1/tables/wedding/${weddingId}`)
    ]);
    if (!gR.ok || !tR.ok) return;
    const guests = await gR.json();
    const tables = await tR.json();
    const table = tables.find(t => t.id === tableId);
    if (!table) return;

    const allMembers = [];
    guests.forEach(g => g.members.forEach(m => allMembers.push({ ...m, guestName: g.display_name })));

    document.getElementById('tableSheetTitle').innerText = `Սեղ. ${table.table_number} — ${seatedHere.length}/${table.capacity}`;

        body.innerHTML = '<p class="text-center text-[#8c7b66] text-sm italic py-6">Դեռ ոչ ոք 🍃</p>';

        row.className = 'flex items-center gap-2.5 p-2.5 rounded-lg border border-[#e8ddd0] bg-white';

            <button onclick="sheetRename(${m.id},'${(m.first_name||'').replace(/'/g,"\\'")}',this)" class="text-xs text-[#8c7b66] hover:text-[#1a1612] px-1 transition-colors">✏️</button>

    });

    for (let i = 0; i < freeCount; i++) {

        row.className = 'flex items-center gap-2.5 p-2.5 rounded-lg border border-dashed border-[#e8ddd0] opacity-50';
        row.innerHTML = `
            <div style="width:24px;height:24px;border-radius:50%;background:var(--cream,#f7f3ee);color:#8c7b66;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px dashed #e8ddd0">—</div>

// ── UNSEATED (GROUP) ──
async function loadUnseated() {
    const [gR, uR] = await Promise.all([
        fetch(`/api/v1/guests/wedding/${weddingId}`),
        fetch(`/api/v1/guest-members/wedding/${weddingId}/unseated`)
    ]);
    const container = document.getElementById('unseatedContainer');
    if (!gR.ok || !uR.ok) { container.innerHTML = '<p class="text-center text-[#8c7b66] text-xs italic py-6">Սխալ</p>'; return; }

    const allGuests = await gR.json();
    globalAllGuests = allGuests;
    globalUnseatedMembers = await uR.json();
    const unseatedIds = new Set(globalUnseatedMembers.map(m => m.id));

    const totalMembers = allGuests.reduce((s, g) => s + g.total_count, 0);
    const unseatedCount = globalUnseatedMembers.length;
    document.getElementById('unseatedSummary').innerText = `${totalMembers - unseatedCount} / ${totalMembers} հոգի նստեցված`;

    if (allGuests.length === 0) { container.innerHTML = '<p class="text-center text-[#8c7b66] text-xs italic py-6">Ավելացրեք հյուրեր ←</p>'; return; }

    container.innerHTML = '';
    allGuests.forEach(guest => {
        const guestUnseated = guest.members.filter(m => unseatedIds.has(m.id));
        const total = guest.members.length;
        const unseatCount = guestUnseated.length;

        const pillCls = unseatCount === 0 ? 'bg-[#7a9e7e]/10 text-[#7a9e7e]' :
                        unseatCount === total ? 'bg-[#c4736a]/10 text-[#c4736a]' : 'bg-[#c9a96e]/15 text-[#8a6c30]';
        const pillText = unseatCount === 0 ? '✓ Բոլոր' : unseatCount === total ? `${unseatCount} չնստ.` : `${unseatCount}/${total}`;

        const card = document.createElement('div');
        card.className = 'bg-white rounded-xl border border-[#e8ddd0] mb-2 overflow-hidden hover:shadow-sm transition-shadow';

        const header = document.createElement('div');
        header.className = 'flex items-center gap-2 px-3 py-2.5 cursor-pointer';
        header.innerHTML = `
            <span class="text-xs font-semibold text-[#1a1612] flex-1 truncate">${guest.display_name}</span>
            <span class="text-[10px] px-2 py-0.5 rounded-full font-semibold flex-shrink-0 ${pillCls}">${pillText}</span>
            <button onclick="event.stopPropagation();openSeatCountModal(${guest.id})" ${unseatCount === 0 ? 'disabled' : ''}
                class="flex-shrink-0 text-[11px] font-semibold px-2 py-1 rounded-md transition-colors ${unseatCount === 0 ? 'opacity-30 cursor-not-allowed bg-[#f7f3ee] text-[#8c7b66]' : 'bg-[#1a1612] text-[#e8d5b0] hover:bg-[#3d3228]'}">
                Նստ. ➔
            </button>
        `;

        const expandDiv = document.createElement('div');
        expandDiv.className = 'border-t border-[#f7f3ee] hidden';

        guest.members.forEach(m => {
            const isSeated = !unseatedIds.has(m.id);
            const row = document.createElement('div');
            row.className = 'flex items-center gap-2 px-4 py-1.5 text-[11px] border-b border-[#f7f3ee] last:border-0 hover:bg-[#f7f3ee] transition-colors';
            row.setAttribute('draggable', isSeated ? 'false' : 'true');
            if (!isSeated) row.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', m.id));
            row.innerHTML = `
                <span class="flex-1 ${isSeated ? 'text-[#7a9e7e]' : 'text-[#5c4f3d]'}">${m.first_name || 'Անանուն հյուր'}</span>
                ${isSeated ? `<span class="text-[9px] bg-[#7a9e7e]/10 text-[#7a9e7e] px-1.5 py-0.5 rounded-full">Սեղ.${m.table_id}</span>` : '<span class="text-[9px] text-[#c8bfb2]">⋮⋮</span>'}
                ${isSeated ? `<button onclick="unseatMember(${m.id})" class="text-[#8c7b66] hover:text-[#c4736a] text-[10px] transition-colors">✕</button>` : ''}
            `;
            expandDiv.appendChild(row);
        });

        header.addEventListener('click', (e) => { if (e.target.tagName === 'BUTTON') return; expandDiv.classList.toggle('hidden'); });
        card.appendChild(header);
        card.appendChild(expandDiv);
        container.appendChild(card);
    });
}

// ── SEAT COUNT MODAL ──
function openSeatCountModal(guestId) {
    const guest = globalAllGuests.find(g => g.id === guestId);
    if (!guest) return;
    const unseatedIds = new Set(globalUnseatedMembers.map(m => m.id));
    const guestUnseated = guest.members.filter(m => unseatedIds.has(m.id));
    if (guestUnseated.length === 0) { alert('Բոլոր անդամները արդեն նստեցված են։'); return; }

    pendingSeatGuest = { guestId, display_name: guest.display_name, unseatedMembers: guestUnseated };
    pendingSeatCount = guestUnseated.length;

    document.getElementById('seatCountTitle').innerText = guest.display_name;
    document.getElementById('seatCountDisplay').innerText = pendingSeatCount;
    document.getElementById('seatCountMax').innerText = `Ընդամենը ${guestUnseated.length} հոգի սպասում է`;
    document.getElementById('seatCountHint').innerText = `Ընտրեք՝ քանիսին այս անգամ նստեցնել։`;
    openModal('seatCountModal');
}

function changeSeatCount(delta) {
    if (!pendingSeatGuest) return;
    pendingSeatCount = Math.max(1, Math.min(pendingSeatGuest.unseatedMembers.length, pendingSeatCount + delta));
    document.getElementById('seatCountDisplay').innerText = pendingSeatCount;
}

async function confirmSeatCount() {
    if (!pendingSeatGuest) return;
    closeModal('seatCountModal');
    await openTablePicker(pendingSeatGuest, pendingSeatCount);
}

async function openTablePicker(guestInfo, count) {
    const [tR, gR] = await Promise.all([
        fetch(`/api/v1/tables/wedding/${weddingId}`),
        fetch(`/api/v1/guests/wedding/${weddingId}`)
    ]);
    if (!tR.ok) return;
    const tables = await tR.json();
    let allMembers = [];
    if (gR.ok) { const gs = await gR.json(); gs.forEach(g => g.members.forEach(m => allMembers.push(m))); }

    document.getElementById('tablePickerTitle').innerText = `${count} հոգու համար`;
    const list = document.getElementById('tablePickerList');
    list.innerHTML = '';

    if (tables.length === 0) {
        list.innerHTML = '<p class="text-center text-[#8c7b66] text-sm italic py-6">Սրահում սեղաններ չկան</p>';
        openModal('tablePickerModal'); return;
    }

    tables.forEach(table => {
        const seated = allMembers.filter(m => m.table_id === table.id).length;
        const available = table.capacity - seated;
        const canFit = available >= count;
        const pct = Math.round((seated / table.capacity) * 100);

        const btn = document.createElement('button');
        btn.disabled = !canFit;
        btn.className = `w-full text-left px-3 py-2.5 rounded-xl border transition-all ${canFit ? 'border-[#e8ddd0] bg-white hover:border-[#c9a96e] hover:bg-[#c9a96e]/5 cursor-pointer' : 'border-[#f0eae2] bg-[#faf8f5] opacity-40 cursor-not-allowed'}`;
        btn.innerHTML = `
            <div class="flex justify-between items-center mb-1.5">
                <span class="text-xs font-semibold text-[#1a1612]">Սեղ. ${table.table_number}</span>
                <span class="text-[10px] text-[#8c7b66]">${catLabel[table.category] || ''}</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="flex-1 h-1 bg-[#f0eae2] rounded-full overflow-hidden">
                    <div class="h-full rounded-full ${canFit ? 'bg-[#7a9e7e]' : 'bg-[#c4736a]'}" style="width:${pct}%"></div>
                </div>
                <span class="text-[10px] font-medium ${canFit ? 'text-[#7a9e7e]' : 'text-[#c4736a]'}">${available} ազատ / ${table.capacity}</span>
            </div>
        `;
        if (canFit) btn.onclick = async () => { closeModal('tablePickerModal'); await seatGroupOnTable(guestInfo, count, table.id); };
        list.appendChild(btn);
    });
    openModal('tablePickerModal');
}

async function seatGroupOnTable(guestInfo, count, tableId) {
    for (const member of guestInfo.unseatedMembers.slice(0, count)) {
        const res = await fetch(`/api/v1/guest-members/${member.id}/seat?table_id=${tableId}`, { method: 'PUT' });
        if (!res.ok) { const err = await res.json().catch(() => ({})); alert(err.detail || 'Սխալ'); break; }
    }
    loadTables(); loadUnseated(); loadGuests();
}

// ── MODAL HELPERS ──
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        if (document.activeElement.id === 'guestName') addGuest();
        if (document.activeElement.id === 'newTableNumber') confirmAddTable();
    }
    if (e.key === 'Escape') ['addTableModal','seatCountModal','tablePickerModal','guestPickerModal','tableSheetModal'].forEach(closeModal);
});
</script>
